name: Sync to Hugging Face

on:
  push:
    branches: [main, phase9]
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install --local

      - name: Configure Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Add Hugging Face remote
        run: |
          git remote remove hf 2>/dev/null || true
          git remote add hf "https://x-access-token:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/vionnagau/diabetes-project-new.git"

      - name: Push to Hugging Face
        env:
          GIT_TERMINAL_PROMPT: 0
        run: |
          git push --force hf HEAD:main

      - name: Install Python upload dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface-hub hf-xet

      - name: Upload model file to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 - <<'PY'
          import os
          from huggingface_hub import HfApi

          repo_id = "vionnagau/diabetes-project-new"
          api = HfApi()
          api.upload_file(
              path_or_fileobj="DiabetesPipeline.joblib",
              path_in_repo="DiabetesPipeline.joblib",
              repo_id=repo_id,
              repo_type="space",
              token=os.environ["HF_TOKEN"]
          )
          print("✔ DiabetesPipeline.joblib uploaded successfully.")
          PY
