name: Sync to Hugging Face

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Hugging Face remote
        run: git remote add hf https://vionnagau:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/vionnagau/diabetes-project-new

      - name: Push to Hugging Face
        run: git push --force hf main
