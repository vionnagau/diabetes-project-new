name: Push Model to Hugging Face Hub

# Trigger on push to main branch or manual trigger
on:
  push:
    branches:
      - main
    paths:
      - 'DiabetesPipeline.joblib'
      - 'train_model.py'
  workflow_dispatch:  # Manual trigger button in GitHub Actions

jobs:
  push-model:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out the code
      - name: Checkout Repository
        uses: actions/checkout@v3
      
      # Step 2: Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # Step 3: Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install huggingface-hub
      
      # Step 4: Push model to Hugging Face Hub
      - name: Push Model to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python << 'EOF'
          from huggingface_hub import HfApi
          import os
          
          api = HfApi()
          
          # Upload the trained model
          api.upload_file(
              path_or_fileobj="DiabetesPipeline.joblib",
              path_in_repo="DiabetesPipeline.joblib",
              repo_id="yourusername/diabetes-risk-model",
              repo_type="model",
              token=os.environ['HF_TOKEN']
          )
          
          print("✓ Model successfully pushed to Hugging Face Hub!")
          EOF
      
      # Step 5: Notify on Slack (Optional)
      - name: Notify Success
        if: success()
        run: echo "✓ Model upload completed successfully!"
      
      # Step 6: Handle errors
      - name: Notify Failure
        if: failure()
        run: echo "✗ Model upload failed. Check logs above."
